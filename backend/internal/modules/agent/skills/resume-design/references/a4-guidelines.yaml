name: a4-guidelines
content: |
  ## A4 单页简历设计规范

  ### 目标
  - 产出常见招聘场景可接受的专业简历，而不是网页、作品集、仪表盘、落地页或海报。
  - 默认控制在一页 A4 内：210mm x 297mm。内容过多时，优先压缩文案、字号、行距、段间距和项目符号，不扩大视觉风格。
  - 样式服务于阅读效率：招聘者应该能在 10-20 秒内扫到姓名、联系方式、教育/工作经历、项目、技能和关键成果。

  ### 推荐样式
  - 背景：白色或接近白色纸面。
  - 正文：深灰或黑色，高对比，可打印。
  - 强调色：最多一个克制颜色，例如深蓝、墨绿、灰蓝；只用于姓名、分区标题、细线或少量标签。
  - 布局：单栏或常规双栏；顶部信息紧凑；分区标题清晰；项目经历用紧凑 bullet。
  - 字号：正文约 13-15px；姓名不超过 24px；分区标题约 14-16px。
  - 间距：行距紧凑但可读，段间距少量；避免大块留白。
  - 技能：用可换行文本或轻量分组，不要做成大面积彩色胶囊或不换行长串。

  ### 禁止样式
  - 禁止 hero 首屏、landing page、bento/card grid、dashboard、portfolio、showcase。
  - 禁止 glassmorphism、aurora、3D、霓虹、发光、复杂渐变、纹理背景、动效、厚重阴影。
  - 禁止大面积紫蓝/粉色/高饱和背景，禁止把整页铺成炫彩色块。
  - 禁止超大标题、营销式价值主张、CTA、按钮、图标堆叠、装饰图形。
  - 禁止 position fixed/absolute、100vh、动画和网页视口布局思维。

  ### 修改策略
  - 用户要求"更专业"时，优先提升信息层级、措辞和可读性，不增加装饰。
  - 用户说"太花/太炫/过头/不像简历"时，先移除渐变、卡片、阴影、大面积背景和装饰图形。
  - 如果一页放不下，先删弱信息、压缩 bullet、合并技能、减小段距；不要通过更复杂布局掩盖溢出。

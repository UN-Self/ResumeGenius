name: resume-design
description: |
  A4 单页简历设计规范。当用户要求调整样式、排版、配色、模板时使用。
trigger: 用户要求调整简历样式或需要设计参考时

usage: |
  1. 调用 load_skill(skill_name="resume-design") 获取完整规范和模板参考
  2. 基于规范中的推荐样式、页面外壳禁区和禁止样式修改简历 CSS
  3. 只生成系统 A4 画布内的正文内容，不要生成网页外壳、灰底预览卡片、整页边框或阴影

tools:
  - name: load_skill
    description: 获取 A4 简历设计规范和模板参考
    params:
      - name: skill_name
        type: string
        description: 固定传 "resume-design"

references:
  - name: a4-guidelines
    description: A4 单页简历设计规范，包含推荐样式、禁止样式和修改策略
  - name: a4-template
    description: A4 精确像素尺寸、内容容量参考和 HTML 模板骨架

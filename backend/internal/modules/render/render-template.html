<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
.resume-page {
  box-sizing: border-box;
  padding: 0;
  background: #ffffff;
  color: #333333;
  font-family: "Inter", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.resume-page *,
.resume-page *::before,
.resume-page *::after { box-sizing: border-box; }
.resume-page h1,
.resume-page h2,
.resume-page h3,
.resume-page h4,
.resume-page h5,
.resume-page h6,
.resume-page p,
.resume-page blockquote,
.resume-page figure,
.resume-page dl,
.resume-page dd { margin: 0; }
.resume-page h1 { font-size: 24px; font-weight: 600; line-height: 1.3; }
.resume-page h2 { font-size: 20px; font-weight: 600; line-height: 1.3; }
.resume-page h3 { font-size: 16px; font-weight: 500; line-height: 1.4; }
.resume-page p  { font-size: 14px; font-weight: 400; line-height: 1.5; min-height: 1.5em; }
.resume-page ul, .resume-page ol { padding-left: 24px; }
.resume-page ul { list-style-type: disc; }
.resume-page ol { list-style-type: decimal; }
.resume-page li { margin-bottom: 4px; }
.resume-page li p { display: inline; }
@page { size: A4; margin: 18mm 20mm; }
</style>
</head>
<body style="margin:0;padding:0;">
<div class="resume-page resume-document">{{CONTENT}}</div>
</body>
</html>

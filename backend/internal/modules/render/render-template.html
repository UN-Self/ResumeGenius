<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
.resume-page {
  box-sizing: border-box;
  border: 1px solid transparent;
  /* ≈ 20mm at 96dpi */
  padding: 0 76px 0 76px;
  background: #ffffff;
  color: #333333;
  font-family: "Inter", "Noto Sans CJK SC", "Microsoft YaHei", "PingFang SC", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  white-space: break-spaces;
  /* Match editor text rendering: disable ligatures so glyph widths are identical. */
  font-variant-ligatures: none;
  font-feature-settings: "liga" 0, "palt" 0, "pwid" 0, "halt" 0, "hkna" 0, "nalt" 0, "fwid" 0;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0;
  word-spacing: 0;
  word-wrap: break-word;
  font-kerning: normal;
  font-synthesis: none;
  tab-size: 4;
  -webkit-text-size-adjust: 100%;
  font-variant-east-asian: normal;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
.resume-page *,
.resume-page *::before,
.resume-page *::after { box-sizing: border-box; }
.resume-page h1,
.resume-page h2,
.resume-page h3,
.resume-page h4,
.resume-page h5,
.resume-page h6,
.resume-page p,
.resume-page blockquote,
.resume-page figure,
.resume-page dl,
.resume-page dd { margin: 0; }
.resume-page h1 { font-size: 24px; font-weight: 600; line-height: 1.3; }
.resume-page h2 { font-size: 20px; font-weight: 600; line-height: 1.3; }
.resume-page h3 { font-size: 16px; font-weight: 500; line-height: 1.4; }
.resume-page p  { font-size: 14px; font-weight: 400; line-height: 1.5; min-height: 1.5em; }
.resume-page ul, .resume-page ol { padding-left: 24px; }
.resume-page ul { list-style-type: disc; }
.resume-page ol { list-style-type: decimal; }
.resume-page li { margin-bottom: 4px; }
.resume-page li p { display: inline; }
.resume-content.ProseMirror > .page + p:last-child:empty,
.resume-content.ProseMirror > .resume + p:last-child:empty,
.resume-content.ProseMirror > .resume-document + p:last-child:empty { display: none; }
/* bottom margin 0 < editor 18mm: PDF content area is intentionally larger
   so content that fits one page in the editor won't spill to two pages in PDF */
/* ≈ 15mm at 96dpi top margin */
@page { size: A4; margin: 56px 0 0 0; }
</style>
</head>
<body style="margin:0;padding:0;">
<div class="resume-page"><div class="resume-document"><div class="resume-content ProseMirror">{{CONTENT}}</div></div></div>
</body>
</html>

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;
    server_tokens off;
    absolute_redirect off;

    # Compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Security headers（CSP 仅在营销站静态资源生效，/app/ 和 /api/ 不限制）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 营销站（根路径）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'self'" always;
    }

    # /app (无尾部斜杠) → 重定向（相对路径，保持浏览器当前协议）
    location = /app {
        return 301 /app/;
    }

    # 工作台 SPA
    location /app/ {
        proxy_pass http://workbench:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API (通用)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.json;
    }

    # SSE (AI 对话) — 最长前缀匹配优先于 /api/
    location /api/v1/ai/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 /50x.json;
    }

    # 50x 错误页（JSON 响应）
    location = /50x.json {
        default_type application/json;
        return 503 '{"code":59999,"data":null,"message":"服务暂时不可用，请稍后重试"}';
    }

    # Cache static assets (re-add security headers since nested block overrides parent)
    location ~* ^/(?!app/|api/).*\.(css|js|woff2?|png|jpg|svg|ico)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'self'" always;
    }
}
